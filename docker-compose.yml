version: "3.9"

services:
  redis:
    image: redis:alpine
    container_name: nomenclature-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomenclature-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_data
      - hf_cache:/root/.cache/huggingface

volumes:
  redis_data:
  chroma_data:
  hf_cache:
